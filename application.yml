apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yatd-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hayahahaha/yatd-config.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: yatd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
